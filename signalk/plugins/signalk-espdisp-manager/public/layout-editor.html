<!doctype html>
<meta charset="utf-8">
<title>espdisp visual layout editor</title>
<!-- Match the device font (LVGL renders Montserrat 14/20/28/48). Loading
     the WOFF2 from Google Fonts so the editor previews use the same
     letterforms the operator sees on the panel. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap">
<style>
  :root {
    /* Palette synced to src/ui/ui_theme.cpp::use_night() so widget
       previews look identical to the device. */
    /* Glass-cockpit palette - kept in lockstep with ui_theme.cpp use_night()
       (enforced by test/widget-parity.test.js). */
    --bg: #0a1018;
    --panel: #101b29;
    --panel-2: #16222f;
    --panel-edge: #1f2d3d;
    --fg: #eef4fa;
    --fg-dim: #8fa7bd;
    --accent: #4fc3f7;
    --accent-2: #36d399;
    --good: #36d399;
    --warn: #ffb84d;
    --bad: #ff5252;
    --port: #ff5252;
    --starboard: #36d399;
    --tide: #288cff;
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 24px;
         font: 14px/1.4 'Montserrat', system-ui, -apple-system, sans-serif;
         background: var(--bg); color: var(--fg); }
  h1 { margin: 0 0 16px 0; font-size: 22px; color: var(--accent); }
  h2 { margin: 24px 0 12px 0; font-size: 14px; color: var(--fg-dim);
       text-transform: uppercase; letter-spacing: 0.08em; }
  button, select, input { font: inherit; }
  input, select { background: var(--panel-2); color: var(--fg);
    border: 1px solid var(--panel-edge); padding: 6px 8px; border-radius: 4px; }
  button { background: var(--panel-2); color: var(--fg);
    border: 1px solid var(--panel-edge); padding: 6px 12px; border-radius: 4px;
    cursor: pointer; }
  button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  button.primary { background: var(--accent); color: #001218; font-weight: 600;
    border-color: var(--accent); }
  button.primary:disabled { opacity: 0.35; cursor: not-allowed; }
  button.ghost { background: transparent; }
  button.danger { color: var(--bad); border-color: transparent; }
  .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
             margin-bottom: 20px; padding: 12px; background: var(--panel);
             border: 1px solid var(--panel-edge); border-radius: 8px; }
  .toolbar label { display: flex; align-items: center; gap: 8px; color: var(--fg-dim); }
  .toolbar .status { margin-left: auto; font-size: 13px; color: var(--fg-dim); }
  .toolbar .status.ok { color: var(--accent-2); }
  .toolbar .status.err { color: var(--bad); }
  .toolbar .status.warn { color: var(--warn); }
  .screens { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
             gap: 16px; }
  .screen { background: var(--panel); border: 1px solid var(--panel-edge);
            border-radius: 8px; padding: 16px; }
  .screen header { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
  .screen header .id { flex: 1; }
  .screen header button.del { color: var(--bad); border-color: transparent; padding: 4px 8px; }
  .screen .meta { color: var(--fg-dim); font-size: 12px; margin-bottom: 12px; }
  .tiles { display: grid; gap: 8px; }
  .tiles[data-rows="2"][data-cols="2"] { grid-template-columns: 1fr 1fr; }
  .tiles[data-rows="2"][data-cols="3"] { grid-template-columns: 1fr 1fr 1fr; }
  .tile { background: var(--panel-2); border: 1px dashed var(--panel-edge);
          border-radius: 6px; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  .tile.empty { opacity: 0.5; }
  .tile .row { display: flex; gap: 6px; }
  .tile .row label { color: var(--fg-dim); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.04em; display: block; }
  .tile select, .tile input { background: var(--bg); width: 100%;
    border: 1px solid var(--panel-edge); padding: 3px 6px; font-size: 12px; }
  .tile .help { font-size: 11px; color: var(--fg-dim); }
  .actions { display: flex; gap: 8px; margin-top: 24px; flex-wrap: wrap; }
  .actions .grow { flex: 1; }
  .preset-picker { position: fixed; inset: 0; background: rgba(0,0,0,0.7);
                   display: none; align-items: center; justify-content: center;
                   z-index: 10; }
  .preset-picker.show { display: flex; }
  .preset-picker .modal { background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 8px; padding: 20px; max-width: 600px; width: 90%;
    max-height: 80vh; overflow: auto; }
  .preset-picker .modal h3 { margin: 0 0 12px 0; color: var(--accent); }
  .preset-picker .modal .preset-list { display: grid; gap: 10px; margin: 16px 0; }
  .preset-picker .preset-item { background: var(--panel-2); border: 1px solid var(--panel-edge);
    border-radius: 6px; padding: 12px; cursor: pointer; }
  .preset-picker .preset-item:hover { border-color: var(--accent); }
  .preset-picker .preset-item h4 { margin: 0 0 4px 0; color: var(--accent); }
  .preset-picker .preset-item .desc { color: var(--fg-dim); font-size: 12px; }
  .preset-picker .preset-item .tiles-preview { display: grid; gap: 4px; margin-top: 8px;
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); }
  .preset-picker .preset-item .tiles-preview span { background: var(--bg);
    border-radius: 3px; padding: 4px 6px; font-size: 11px; color: var(--fg-dim); }
  .mp-combo { position: relative; }
  .mp-combo input { width: 100%; box-sizing: border-box; }
  .mp-combo .opts { position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
    background: var(--panel-2); border: 1px solid var(--accent); border-top: 0;
    max-height: 240px; overflow-y: auto; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.6); }
  .mp-combo .opts.show { display: block; }
  .mp-combo .opt { padding: 6px 10px; cursor: pointer; font-family: ui-monospace, monospace; font-size: 13px; }
  .mp-combo .opt:hover, .mp-combo .opt.active { background: var(--accent); color: #001218; }
  .mp-combo .opt .matchhi { background: rgba(87, 199, 216, 0.45); border-radius: 2px; }
  .mp-combo .opt:hover .matchhi, .mp-combo .opt.active .matchhi { background: rgba(0, 0, 0, 0.25); }
  .mp-combo .opts-none { padding: 8px 10px; color: var(--fg-dim); font-style: italic; font-size: 12px; }
  /* Widget visual preview - approximates the device LVGL render so the
     editor canvas matches what the panel will show. */
  /* Use Montserrat to match LVGL's lv_font_montserrat_* render on the
     device. Inter was a leftover from before the font sync. */
  /* Preview tile geometry mirrors the device QuadGrid tile: a fixed
     aspect box that scales with the editor card so what the operator
     sees in the editor matches the pixels the panel will draw. Sizes
     are device's actual font scale divided by 4 (sunton 198 px tile ->
     ~50 px preview height, montserrat_38 -> 24 px CSS). */
  .wpreview { display: flex; align-items: center; justify-content: center;
    min-height: 188px; padding: 24px 10px 28px; background: var(--bg); border: 1px solid var(--panel-edge);
    border-radius: 6px; margin: 8px 0 4px 0; font-family: 'Montserrat', system-ui, sans-serif;
    color: var(--fg); overflow: hidden; position: relative; }
  /* Chrome caption matches the device tile's top-left caption (montserrat_14). */
  .wpreview .chrome-cap { position: absolute; top: 8px; left: 10px;
    font-size: 12px; color: var(--fg-dim); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.04em; }
  .wpreview .num-stack { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  /* num-primary matches montserrat_38 on device (1:1 px). */
  .wpreview .num-primary { font-size: 38px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; color: var(--accent); }
  .wpreview .num-unit { font-size: 20px; color: var(--fg-dim); margin-left: 6px; }
  .wpreview .num-row { display: flex; align-items: baseline; }
  /* Secondary tracks the number (centered below, not pinned to corner). */
  .wpreview .num-secondary { font-size: 14px; color: var(--fg-dim); text-align: center; }
  /* Compass mirrors device paint_compass_body. Ring 142 px matches the
     device's dia = min(tile_w, tile_h) - 56 = 234 - 56 ≈ 178 px on a
     sunton-480 tile (we use 142 px so the preview card stays compact);
     heading 38 px = lv_font_montserrat_38 on device. Cardinals padded
     in 12 px so they don't touch the heading text or each other when
     the heading is at its widest ("047" ≈ 64 px). */
  .wpreview .compass { position: relative; width: 142px; height: 142px;
    border: 2px solid var(--accent); border-radius: 50%; display: flex;
    align-items: center; justify-content: center;
    background: rgba(87, 199, 216, 0.04); }
  .wpreview .compass .heading { color: var(--accent); font-weight: 700; font-size: 38px;
    letter-spacing: -0.02em; line-height: 1; }
  .wpreview .compass .marker { position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
    color: var(--warn); font-size: 14px; font-weight: 700; }
  .wpreview .compass .cts { position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
    color: var(--warn); font-size: 14px; font-weight: 500; white-space: nowrap; }
  .wpreview .compass .card { position: absolute; color: var(--fg-dim); font-size: 14px;
    font-weight: 700; line-height: 1; }
  .wpreview .compass .card-n { top: 8px; left: 50%; transform: translateX(-50%); color: var(--fg); }
  .wpreview .compass .card-e { right: 10px; top: 50%; transform: translateY(-50%); }
  .wpreview .compass .card-s { bottom: 8px; left: 50%; transform: translateX(-50%); }
  .wpreview .compass .card-w { left: 10px; top: 50%; transform: translateY(-50%); }
  /* WindRose: same diameter as compass for visual consistency between
     the cockpit's two round-instrument widgets. */
  .wpreview .rose { position: relative; width: 142px; height: 142px;
    border: 2px solid var(--warn); border-radius: 50%; display: flex;
    align-items: center; justify-content: center; color: var(--warn); font-weight: 700; font-size: 38px;
    line-height: 1; }
  /* Bar: percent is the hero number above the bar; matches device
     paint_bar_body (montserrat_38 percent + ~22 px bar). */
  .wpreview .bar { width: 100%; max-width: 220px; display: flex;
    flex-direction: column; align-items: center; gap: 12px; }
  .wpreview .bar-row { font-size: 38px; font-weight: 700; color: var(--accent);
    line-height: 1; letter-spacing: -0.02em; }
  .wpreview .bar-outer { width: 100%; height: 22px; background: #001a20;
    border: 1px solid var(--panel-edge); border-radius: 3px; overflow: hidden; }
  .wpreview .bar-fill { height: 100%; background: var(--good); width: 65%; }
  .wpreview .gauge { width: 132px; height: 132px; position: relative; }
  .wpreview .gauge svg { width: 100%; height: 100%; }
  .wpreview .ap { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 240px; }
  .wpreview .ap-state { background: #143b2a; color: var(--good); border: 1px solid var(--good);
    text-align: center; padding: 6px 0; border-radius: 4px; font-weight: 700; font-size: 20px;
    letter-spacing: 0.04em; }
  .wpreview .ap-target { text-align: center; color: var(--fg-dim); font-size: 14px; }
  .wpreview .ap-btns { display: flex; gap: 4px; }
  .wpreview .ap-btn { flex: 1; background: var(--panel-edge); color: var(--fg); border-radius: 3px;
    text-align: center; padding: 6px 0; font-size: 14px; font-weight: 500; }
  /* Text widget: matches device montserrat_20+ at center; preserve
     newlines in textContent (lat\nlon). */
  .wpreview .text-val { font-size: 20px; font-family: 'Montserrat', system-ui, sans-serif;
    color: var(--accent); text-align: center; line-height: 1.25;
    white-space: pre-line; font-weight: 600; }
  .wpreview .btn-bubble { background: var(--accent); color: #001218; border-radius: 20px;
    padding: 10px 22px; font-weight: 700; font-size: 16px; letter-spacing: 0.04em; }
  .wpreview .trend svg { width: 100%; height: 72px; }
  /* Trend tile: device falls back to the latest numeric value, so the number
     is the hero and the sparkline sits behind it as a faint watermark. */
  .wpreview .trend-ghost { position: absolute; left: 0; right: 0; bottom: 0;
    pointer-events: none; }
  .wpreview .trend-ghost svg { height: 96px; }
  .wpreview .trend-num { position: relative; z-index: 1; }
  .wpreview.empty { color: var(--fg-dim); font-style: italic; min-height: 60px; }
  /* windDial fills the whole tile width and stays square */
  .wpreview.wd-wrap { min-height: 0; padding: 0; }
  .wpreview.wd-wrap svg { width: 100%; max-width: 360px; aspect-ratio: 1 / 1; }
  .preset-picker .modal-close { float: right; }
  .json-view { margin-top: 24px; padding: 12px; background: #06090f; border-radius: 6px;
    white-space: pre-wrap; font: 12px ui-monospace, monospace; color: var(--fg-dim);
    max-height: 280px; overflow: auto; }
  details summary { cursor: pointer; color: var(--fg-dim); margin-top: 20px; }
</style>

<h1>espdisp visual layout editor</h1>

<div class="toolbar">
  <label>Profile <select id="profile-select"></select></label>
  <label>Display <select id="display-select"></select></label>
  <button id="reload-btn">Reload</button>
  <button id="insert-preset-btn">+ Insert preset screen</button>
  <button id="add-empty-btn">+ Empty screen</button>
  <span class="grow"></span>
  <button id="save-btn" class="primary" disabled>Save changes</button>
  <span id="status" class="status">loading…</span>
</div>

<!-- Device preview: fetch /api/screenshot.png from the live device URL
     so the operator can see what's actually on the panel before/after
     a Save. URL persisted in localStorage as 'espdisp.deviceUrl'. -->
<div class="controls" style="border-top: 1px solid var(--panel-edge); margin-top: 8px; padding-top: 12px;">
  <label>Device URL <input id="device-url" placeholder="http://10.42.0.67" style="width: 220px;"></label>
  <button id="device-refresh-btn">Refresh device preview</button>
  <button id="device-clear-btn" class="ghost">Clear</button>
  <span id="device-status" class="status" style="margin-left: auto;"></span>
</div>
<div id="device-preview" style="margin: 8px 0; min-height: 0;"></div>

<h2>Screens</h2>
<div id="screens" class="screens"></div>

<details>
  <summary>Raw dashboard JSON (read-only preview)</summary>
  <pre id="json-view" class="json-view"></pre>
</details>

<!-- ===================================================================== -->
<!-- Slice 5: manifest-gated field editor. A device-and-manifest oriented  -->
<!-- CRUD surface (distinct from the profile/display editor above): pick a  -->
<!-- connected device, and author its views + per-field bindings gated to   -->
<!-- the device's reported ui.capabilities (or a built-in default set when   -->
<!-- the device is offline / pre-manifest). Writes go straight to the        -->
<!-- assigned profile via the /editor/* JSON routes and reload the device.   -->
<section id="fe" class="fe">
  <h2>Field editor (device-gated)</h2>
  <div class="toolbar">
    <label>Device <select id="fe-device"><option value="">— select a device —</option></select></label>
    <button id="fe-reload">Reload</button>
    <button id="fe-add-screen" class="primary" disabled>+ Add view</button>
    <span class="grow"></span>
    <span id="fe-manifest-src" class="status"></span>
    <span id="fe-status" class="status"></span>
  </div>
  <div id="fe-screens" class="fe-screens"></div>
</section>
<style>
  .fe { margin-top: 28px; border-top: 1px solid var(--panel-edge); padding-top: 12px; }
  .fe-screens { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 16px; }
  .fe-screen { background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 8px; padding: 14px; }
  .fe-screen > header { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .fe-screen > header input.title { flex: 1; }
  .fe-screen .count { color: var(--fg-dim); font-size: 12px; }
  .fe-field { background: var(--panel-2); border: 1px solid var(--panel-edge); border-radius: 6px;
              padding: 10px; margin-bottom: 8px; display: grid; gap: 6px; }
  .fe-field .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .fe-field .row > label { display: flex; gap: 4px; align-items: center; color: var(--fg-dim); font-size: 12px; }
  .fe-field input, .fe-field select { padding: 4px 6px; }
  .fe-field .swatches { display: flex; gap: 4px; align-items: center; }
  .fe-field .swatch { width: 18px; height: 18px; border-radius: 3px; border: 1px solid var(--panel-edge); cursor: pointer; }
  .fe-field .swatch.active { outline: 2px solid var(--accent); }
  .fe-field .errs { color: var(--bad); font-size: 12px; }
  .fe-field .zones { font-family: monospace; width: 100%; min-height: 40px; }
  .fe-empty { color: var(--fg-dim); font-size: 13px; padding: 6px 0; }
  .fe-mini { font-size: 12px; padding: 4px 8px; }
</style>

<div class="preset-picker" id="preset-picker">
  <div class="modal">
    <button class="ghost modal-close" id="preset-close">×</button>
    <h3>Insert a preset screen</h3>
    <p style="color: var(--fg-dim); margin: 0;">
      Filtered for display class: <strong id="preset-display-label">…</strong>
    </p>
    <div class="preset-list" id="preset-list"></div>
  </div>
</div>

<!-- shared <datalist> of SK paths, populated from /presets/widgets -->
<datalist id="sk-paths"></datalist>

<script>
'use strict';

// --- API client ---------------------------------------------------------

const API = '/plugins/espdisp-manager';

function authHeaders () {
  const h = { 'content-type': 'application/json' };
  const t = localStorage.getItem('SK_TOKEN');
  if (t) h.authorization = 'Bearer ' + t;
  h['x-espdisp-authorization'] = 'Bearer ' + (localStorage.getItem('ESPDISP_DEV_TOKEN') || 'espdisp-dev');
  return h;
}

async function api (path, opts) {
  const r = await fetch(API + path, { credentials: 'include', headers: authHeaders(), ...opts });
  if (!r.ok) throw new Error(path + ' → ' + r.status);
  const ct = r.headers.get('content-type') || '';
  return ct.includes('application/json') ? r.json() : r.text();
}

// --- State --------------------------------------------------------------

const state = {
  profileId: 'default',
  profileNames: {},
  displayClass: 'sunton-480',     // currently-targeted display
  displayClasses: [],             // catalogue from /presets/displays
  doc: null,
  dirty: false,
  widgetTypes: [],                // [{ id, label, metrics: {...} }]
  widgetTypesById: {},
  paths: [],                      // string[] from /presets/widgets
  presetsByClass: {},             // displayClass -> screens[]
};

// --- DOM helpers --------------------------------------------------------

function el (tag, props, ...children) {
  const node = document.createElement(tag);
  // Many HTML element properties are read-only getters that can't be
  // assigned via Object.assign (dataset, list, style, classList...).
  // Use setAttribute for everything except event handlers (on*) and
  // textContent/innerHTML (need direct assignment).
  if (props) {
    for (const k of Object.keys(props)) {
      const v = props[k];
      if (v == null) continue;
      if (k === 'dataset') {
        for (const dk in v) node.dataset[dk] = v[dk];
      } else if (k.startsWith('on') && typeof v === 'function') {
        node[k] = v;
      } else if (k === 'textContent' || k === 'innerHTML' || k === 'value' || k === 'checked') {
        node[k] = v;
      } else if (k === 'className') {
        node.className = v;
      } else {
        node.setAttribute(k, v);
      }
    }
  }
  for (const child of children) {
    if (child == null || child === false) continue;
    if (Array.isArray(child)) {
      for (const c of child) if (c) node.append(c.nodeType ? c : document.createTextNode(String(c)));
    } else {
      node.append(child.nodeType ? child : document.createTextNode(String(child)));
    }
  }
  return node;
}

// --- Searchable metric-path combobox ----------------------------------------
// Replaces the native <input list="sk-paths"> + <datalist> pair, which only
// surfaces suggestions while typing and never shows the full set. This widget
// always exposes the full SK path list, filters as the user types, supports
// arrow-key navigation + enter to select, and highlights the matched substring
// so the operator can see why a result is in the list.
function metricPathCombobox (value, placeholder, onChange) {
  const root = el('div', { className: 'mp-combo' });
  const input = el('input', { value: value || '', placeholder: placeholder || 'navigation.speedOverGround' });
  const opts = el('div', { className: 'opts' });
  root.append(input, opts);
  let activeIdx = -1;

  function close () { opts.classList.remove('show'); opts.replaceChildren(); activeIdx = -1; }
  function render (filter) {
    opts.replaceChildren();
    const q = (filter || '').trim().toLowerCase();
    const all = state.paths || [];
    const matches = q ? all.filter((p) => p.toLowerCase().includes(q)) : all;
    if (!matches.length) {
      opts.append(el('div', { className: 'opts-none' }, q ? 'no match' : 'no paths loaded'));
      opts.classList.add('show');
      return;
    }
    // Cap the rendered list to keep DOM cost reasonable; ~200 is more than
    // any realistic SK path catalogue and the user can keep typing to narrow.
    matches.slice(0, 200).forEach((p, i) => {
      let display = document.createTextNode(p);
      if (q) {
        const idx = p.toLowerCase().indexOf(q);
        if (idx >= 0) {
          const frag = document.createDocumentFragment();
          frag.append(document.createTextNode(p.slice(0, idx)));
          frag.append(el('span', { className: 'matchhi' }, p.slice(idx, idx + q.length)));
          frag.append(document.createTextNode(p.slice(idx + q.length)));
          display = frag;
        }
      }
      const opt = el('div', { className: 'opt' });
      opt.append(display);
      opt.addEventListener('mousedown', (e) => {
        e.preventDefault();  // keep input focus
        input.value = p;
        if (onChange) onChange(p);
        close();
      });
      opts.append(opt);
    });
    opts.classList.add('show');
    activeIdx = -1;
  }
  function highlight (n) {
    const items = opts.querySelectorAll('.opt');
    if (!items.length) return;
    items.forEach((el) => el.classList.remove('active'));
    activeIdx = ((n % items.length) + items.length) % items.length;
    items[activeIdx].classList.add('active');
    items[activeIdx].scrollIntoView({ block: 'nearest' });
  }

  input.addEventListener('focus', () => render(input.value));
  input.addEventListener('input', () => { render(input.value); if (onChange) onChange(input.value); });
  input.addEventListener('blur', () => setTimeout(close, 100));  // allow mousedown to fire
  input.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault();
      if (!opts.classList.contains('show')) render(input.value);
      highlight(activeIdx + 1);
    } else if (e.key === 'ArrowUp') { e.preventDefault(); highlight(activeIdx - 1); }
    else if (e.key === 'Enter') {
      const items = opts.querySelectorAll('.opt');
      if (activeIdx >= 0 && items[activeIdx]) {
        const text = items[activeIdx].textContent;

}

function sampleFor (tile, fallback) {
  // Look up by primary path first, then any string field, then fallback.
  if (tile) {

    for (const path of candidates) {
      if (typeof path === 'string' && PATH_SAMPLES[path]) return PATH_SAMPLES[path];
    }

}

        ${tile(8, 'AWS', 'kn', '12.4', '#ffb84d')}
        ${tile(126, 'AWA', '', '42S', '#eef4fa')}
        ${tile(244, 'TWS', 'kn', '14.5', '#eef4fa')}
        ${tile(362, 'TWA', '', '46S', '#eef4fa')}`;
      const wrap = el('div', { className: 'wpreview wd-wrap' });
      wrap.append(svg);
      return wrap;
    }
    case 'gauge': {
      // 270-degree sweep arc with grid-color background and accent fill.
      // Adding tick marks at 0/25/50/75/100% improves readability over the
      // bare arc - the operator can see at-a-glance where the needle sits
      // relative to the range.
      const s = sampleFor(tile, { percent: 65 });
      const pct = Math.max(0, Math.min(100, s.percent || 0));
      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('viewBox', '0 0 100 100');
      // Arc geometry: 270° sweep from 135° (bottom-left) through top to 45° (bottom-right).
      function polar (deg, r) {
        const rad = (deg - 90) * Math.PI / 180;
        return [50 + r * Math.cos(rad), 50 + r * Math.sin(rad)];
      }
      // Sweep angles
      const A0 = -135, A1 = 135;  // -135° (bottom-left) to 135° (bottom-right)
      function arcPath (start, end, r) {
        const [x0, y0] = polar(start, r);
        const [x1, y1] = polar(end, r);
        const large = (end - start) > 180 ? 1 : 0;
        return `M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}`;
      }
      const fillEnd = A0 + (A1 - A0) * (pct / 100);
      let ticks = '';
      for (let i = 0; i <= 4; ++i) {
        const a = A0 + (A1 - A0) * (i / 4);
        const [tx, ty] = polar(a, 36);
        const [tx2, ty2] = polar(a, 30);
        ticks += `<line x1="${tx}" y1="${ty}" x2="${tx2}" y2="${ty2}" stroke="#8fa59d" stroke-width="1"/>`;
      }
      // Percent label only - the metric label lives in chrome-cap so it
      // doesn't duplicate inside the arc. Matches device paint_gauge_body
      // after removing the second caption that overlapped the percent.
      svg.innerHTML =
        `<path d="${arcPath(A0, A1, 40)}" fill="none" stroke="#52736f" stroke-width="8" stroke-linecap="round"/>` +
        `<path d="${arcPath(A0, fillEnd, 40)}" fill="none" stroke="#57c7d8" stroke-width="8" stroke-linecap="round"/>` +
        ticks +
        `<text x="50" y="60" font-family="Montserrat" font-size="28" font-weight="700" fill="#57c7d8" text-anchor="middle">${pct}%</text>`;
      const wrap = el('div', { className: 'wpreview' });
      const cc = chromeCap(tile); if (cc) wrap.append(cc);
      const gauge = el('div', { className: 'gauge' });
      gauge.append(svg);
      wrap.append(gauge);
      return wrap;
    }
    case 'bar': {
      const s = sampleFor(tile, { percent: 65 });
      const pct = Math.max(0, Math.min(100, s.percent || 0));
      const fill = el('div', { className: 'bar-fill' });
      fill.style.width = pct + '%';
      const wrap = el('div', { className: 'wpreview' });
      const cc = chromeCap(tile); if (cc) wrap.append(cc);
      // Hero percent number sits above the bar (mirrors device
      // paint_bar_body: big accent percent + smaller bar beneath).
      wrap.append(el('div', { className: 'bar' },
        el('div', { className: 'bar-row' }, pct + '%'),
        el('div', { className: 'bar-outer' }, fill)));
      return wrap;
    }
    case 'trend': {
      // The device renders a trend metric inside a grid tile as its latest
      // NUMERIC value -- the sparkline chart only exists as a dedicated
      // template, not a per-tile widget (ui_layouts.cpp: `WidgetKind::Trend:
      // sparkline not yet implemented; fall back` -> Numeric). So preview the
      // numeric hero (device-accurate) over a faint sparkline watermark that
      // keeps the trend widget distinct in the picker.
      const s = sampleFor(tile, { value: '8.4', unit: 'm' });
      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('viewBox', '0 0 220 56');
      svg.setAttribute('preserveAspectRatio', 'none');
      const pts = [];
      for (let x = 0; x <= 220; x += 11) {
        const y = 28 + 18 * Math.sin(x / 18) + 6 * Math.sin(x / 6);
        pts.push(`${x},${y.toFixed(1)}`);
      }
      svg.innerHTML = `<polyline points="${pts.join(' ')}" fill="none" stroke="#57c7d8" stroke-width="2" stroke-opacity="0.22"/>` +
                      `<polyline points="0,56 ${pts.join(' ')} 220,56" fill="rgba(87,199,216,0.06)" stroke="none"/>`;
      const wrap = el('div', { className: 'wpreview trend-wrap' });
      const cc = chromeCap(tile); if (cc) wrap.append(cc);
      const trend = el('div', { className: 'trend trend-ghost' });
      trend.append(svg);
      wrap.append(trend);
      wrap.append(el('div', { className: 'num-stack trend-num' },
        el('div', { className: 'num-row' },
          el('span', { className: 'num-primary' }, s.value),
          el('span', { className: 'num-unit' }, s.unit)),
        el('div', { className: 'num-secondary' }, (tile && tile.primary) ? tile.primary.split('.').pop() : 'latest value')));
      return wrap;
    }
    case 'autopilot': {
      const wrap = el('div', { className: 'wpreview' });
      const cc = chromeCap(tile); if (cc) wrap.append(cc);
      wrap.append(el('div', { className: 'ap' },
        el('div', { className: 'ap-state' }, 'AUTO'),
        el('div', { className: 'ap-target' }, 'target 048°'),
        el('div', { className: 'ap-btns' },
          el('div', { className: 'ap-btn' }, '-10'),
          el('div', { className: 'ap-btn' }, '-1'),
          el('div', { className: 'ap-btn' }, '+1'),
          el('div', { className: 'ap-btn' }, '+10'))));
      return wrap;
    }
    case 'text': {
      const wrap = el('div', { className: 'wpreview' });
      const cc = chromeCap(tile); if (cc) wrap.append(cc);
      const s = sampleFor(tile, { value: "41°23.16'N\n2°10.43'E" });
      const tv = el('div', { className: 'text-val' });
      tv.textContent = s.value;
      wrap.append(tv);
      return wrap;
    }
    case 'button': {
      const wrap = el('div', { className: 'wpreview' });
      const cc = chromeCap(tile); if (cc) wrap.append(cc);
      wrap.append(el('div', { className: 'btn-bubble' }, title || 'TAP'));
      return wrap;
    }
    default:
      return el('div', { className: 'wpreview empty' }, widget + ' (no preview)');
  }
}

function setStatus (msg, kind) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status ' + (kind || '');
}
function markDirty () { state.dirty = true; document.getElementById('save-btn').disabled = false;
  setStatus('unsaved changes', 'warn'); }
function markClean () { state.dirty = false; document.getElementById('save-btn').disabled = true; }

// --- Doc accessors ------------------------------------------------------

function dashboardDoc () {
  if (!state.doc) return { settings: {}, layout: { screens: [] } };
  if (state.doc.dashboard) return state.doc.dashboard;
  return state.doc;
}
function ensureScreens () {
  const d = dashboardDoc();
  if (!d.layout) d.layout = { version: 1, screens: [] };
  if (!Array.isArray(d.layout.screens)) d.layout.screens = [];
  return d.layout.screens;
}
function displayClassMeta () {
  return state.displayClasses.find((c) => c.id === state.displayClass) || { tilesPerScreen: 4, gridCols: 2, gridRows: 2 };
}

// --- Rendering ----------------------------------------------------------

function renderJsonView () {
  document.getElementById('json-view').textContent = JSON.stringify(dashboardDoc(), null, 2);
}

function renderScreens () {
  const root = document.getElementById('screens');
  root.replaceChildren();
  const screens = ensureScreens();
  screens.forEach((screen, i) => root.append(renderScreen(screen, i)));
  if (!screens.length) {
    root.append(el('div', { className: 'screen', style: 'opacity:0.6;text-align:center;color:var(--fg-dim);' },
      'No screens yet. Click "+ Insert preset screen" to add a curated one, or "+ Empty screen" to start blank.'));
  }
}

function renderScreen (screen, idx) {
  const meta = displayClassMeta();
  const expectedTiles = meta.tilesPerScreen;
  if (!Array.isArray(screen.tiles)) screen.tiles = [];
  while (screen.tiles.length < expectedTiles) screen.tiles.push(null);
  const tilesDiv = el('div', {
    className: 'tiles',
    dataset: { rows: String(meta.gridRows), cols: String(meta.gridCols) },
  });
  screen.tiles.slice(0, expectedTiles).forEach((tile, ti) => {
    tilesDiv.append(renderTile(tile, idx, ti));
  });
  return el('div', { className: 'screen' },
    el('header', null,
      el('input', {
        className: 'id', value: screen.id || '',
        placeholder: 'screen id (e.g. dashboard)',
        oninput: (e) => { screen.id = e.target.value; markDirty(); },
      }),
      el('input', {
        value: screen.title || '', placeholder: 'title',
        style: 'flex:1;', oninput: (e) => { screen.title = e.target.value; markDirty(); },
      }),
      el('button', {
        className: 'del',
        title: 'Delete screen',
        onclick: () => {
          if (!confirm('Delete screen "' + (screen.id || 'unnamed') + '"?')) return;
          ensureScreens().splice(idx, 1);
          markDirty(); renderScreens(); renderJsonView();
        },
      }, '×'),
    ),
    el('div', { className: 'meta' }, `${meta.gridCols}×${meta.gridRows} grid · ${expectedTiles} tiles`),
    tilesDiv,
  );
}

function renderTile (tile, screenIdx, tileIdx) {
  if (!tile) tile = {};
  const tileObj = tile;
  // Widget type select
  const typeSel = el('select', {
    onchange: (e) => {
      const screens = ensureScreens();
      const screen = screens[screenIdx];
      if (!Array.isArray(screen.tiles)) screen.tiles = [];
      while (screen.tiles.length <= tileIdx) screen.tiles.push(null);
      if (!e.target.value) {
        screen.tiles[tileIdx] = null;
      } else {
        screen.tiles[tileIdx] = { ...screen.tiles[tileIdx], widget: e.target.value };
      }
      markDirty(); renderScreens(); renderJsonView();
    },
  });
  typeSel.append(el('option', { value: '' }, '— empty —'));
  state.widgetTypes.forEach((w) => {
    const opt = el('option', { value: w.id }, w.label);
    if (tileObj.widget === w.id) opt.selected = true;
    typeSel.append(opt);
  });

  const children = [
    el('div', { className: 'row' }, el('div', null,
      el('label', null, 'Widget'), typeSel)),
  ];

  if (tileObj.widget) {
    const meta = state.widgetTypesById[tileObj.widget];
    // Title row
    children.push(el('div', { className: 'row' }, el('div', { style: 'flex:1;' },
      el('label', null, 'Title'),
      el('input', {
        value: tileObj.title || '',
        placeholder: '(optional)',
        oninput: (e) => {
          tileObj.title = e.target.value;
          ensureScreens()[screenIdx].tiles[tileIdx] = tileObj;
          markDirty(); renderJsonView();
        },
      }))));
    // Metric rows per widget meta. Each row uses the searchable
    // combobox so the operator can see the whole SK path catalogue and
    // filter as they type, rather than relying on the native datalist
    // hint. Iterate ALL metric keys defined by the widget (not just
    // primary/secondary) so windDial-style widgets with awa/aws/twa/...
    // surface every slot.
    if (meta && meta.metrics) {
      for (const key of Object.keys(meta.metrics)) {
        const metricMeta = meta.metrics[key];
        if (!metricMeta) continue;
        children.push(el('div', { className: 'row' }, el('div', { style: 'flex:1;' },
          el('label', null, metricMeta.label + (metricMeta.required ? ' *' : '')),
          metricPathCombobox(tileObj[key] || '', 'navigation.speedOverGround', (v) => {
            tileObj[key] = v;
            ensureScreens()[screenIdx].tiles[tileIdx] = tileObj;
            markDirty(); renderJsonView();
          }))));
      }
    }
    if (meta && meta.description) {
      children.push(el('div', { className: 'help' }, meta.description));
    }
  } else {
    children.push(el('div', { className: 'help' }, 'Pick a widget type to configure this tile.'));
  }
  // Visual preview of the widget as it will render on the device.
  children.push(widgetPreview(tileObj.widget, tileObj));
  return el('div', { className: 'tile' + (tileObj.widget ? '' : ' empty') }, ...children);
}

// --- Preset picker ------------------------------------------------------

async function openPresetPicker () {
  const picker = document.getElementById('preset-picker');
  const list = document.getElementById('preset-list');
  document.getElementById('preset-display-label').textContent =
    displayClassMeta().label || state.displayClass;
  // Lazy-load presets for this display class
  if (!state.presetsByClass[state.displayClass]) {
    try {
      const r = await api('/presets/screens?displayClass=' + encodeURIComponent(state.displayClass));
      state.presetsByClass[state.displayClass] = r.screens || [];
    } catch (e) {
      list.replaceChildren(el('p', { style: 'color:var(--bad);' }, 'Failed to load presets: ' + e.message));
      picker.classList.add('show');
      return;
    }
  }
  const presets = state.presetsByClass[state.displayClass];
  list.replaceChildren(...presets.map((p) => el('div', {
    className: 'preset-item',
    onclick: () => {
      const screens = ensureScreens();
      // Deep-clone the preset so further edits don't mutate the cached one
      screens.push(JSON.parse(JSON.stringify(p)));
      markDirty(); renderScreens(); renderJsonView();
      picker.classList.remove('show');
    },
  },
    el('h4', null, p.title || p.id),
    el('div', { className: 'desc' }, p.id + ' · ' + (p.type || 'grid') + ' · ' + (p.tiles || []).length + ' tile(s)'),
    el('div', { className: 'tiles-preview' },
      ...(p.tiles || []).map((t) => el('span', null,
        (t.title || '') + (t.widget ? ' [' + t.widget + ']' : ''))),
    ),
  )));
  picker.classList.add('show');
}

function addEmptyScreen () {
  const screens = ensureScreens();
  const meta = displayClassMeta();
  const tiles = Array(meta.tilesPerScreen).fill(null);
  screens.push({
    id: 'screen' + (screens.length + 1),
    title: 'Screen ' + (screens.length + 1),
    type: 'grid',
    tiles,
  });
  markDirty(); renderScreens(); renderJsonView();
}

// --- Load / save --------------------------------------------------------

async function loadCatalogue () {
  // /presets/displays and /presets/widgets are public-ish but require
  // SignalK auth in this lab. Failure -> graceful fallback to a tiny
  // built-in catalog so the editor degrades but stays usable.
  try {
    const [d, w] = await Promise.all([
      api('/presets/displays'),
      api('/presets/widgets'),
    ]);
    state.displayClasses = d.displayClasses || [];
    state.widgetTypes = w.widgetTypes || [];
    state.paths = w.paths || [];
  } catch (e) {
    state.displayClasses = [
      { id: 'sunton-480', label: 'Sunton 480×480 (fallback)', tilesPerScreen: 4, gridCols: 2, gridRows: 2 },
    ];
    state.widgetTypes = ['numeric', 'compass', 'windRose'].map((id) => ({
      id, label: id, metrics: { primary: { required: true, label: 'Metric path' } },
    }));
    state.paths = [];
    setStatus('catalogue offline; using built-ins', 'warn');
  }
  state.widgetTypesById = Object.fromEntries(state.widgetTypes.map((w) => [w.id, w]));
  const dl = document.getElementById('sk-paths');
  dl.replaceChildren(...state.paths.map((p) => el('option', { value: p })));
  const dispSel = document.getElementById('display-select');
  dispSel.replaceChildren(...state.displayClasses.map((c) => {
    const o = el('option', { value: c.id }, c.label || c.id);
    if (c.id === state.displayClass) o.selected = true;
    return o;
  }));
}

async function loadProfileList () {
  try {
    const d = await api('/profiles');
    const list = (d && Array.isArray(d.profiles)) ? d.profiles : [];
    if (list.length) {
      state.profileNames = {};
      list.forEach((p) => { state.profileNames[p.id] = p.name || p.id; });
      if (!state.profileNames[state.profileId]) state.profileId = list[0].id;
    } else {
      state.profileNames = { default: 'Default ESP Display' };
    }
  } catch (e) {
    state.profileNames = { default: 'Default ESP Display' };
  }
  const sel = document.getElementById('profile-select');
  sel.replaceChildren(...Object.entries(state.profileNames).map(([id, name]) => {
    const o = el('option', { value: id }, name + ' (' + id + ')');
    if (id === state.profileId) o.selected = true;
    return o;
  }));
}

async function loadProfile () {
  setStatus('loading ' + state.profileId + '…');
  try {
    state.doc = await api('/profiles/' + encodeURIComponent(state.profileId) + '/dashboard.json');
    markClean(); setStatus('loaded ' + state.profileId, 'ok');
    renderScreens(); renderJsonView();
  } catch (e) {
    setStatus('load failed: ' + e.message, 'err');
  }
}

async function save () {
  if (!state.dirty) return;
  setStatus('saving…');
  try {
    const payload = state.doc.dashboard
      ? { presetId: state.profileId, ...state.doc }
      : { presetId: state.profileId, dashboard: state.doc, kind: 'espdisp.dashboard.v1' };
    await api('/profiles/import-dashboard', { method: 'POST', body: JSON.stringify(payload) });
    markClean(); setStatus('saved ' + state.profileId + ' ✓', 'ok');
    await loadProfile();
    // After save, kick off a device-preview refresh on a small delay so
    // the panel has time to receive + apply the new config. No-op if no
    // device URL is configured.
    if (state.deviceUrl) setTimeout(() => fetchDevicePreview('post-save'), 1500);
  } catch (e) {
    setStatus('save failed: ' + e.message, 'err');
  }
}

// --- Device screenshot preview ----------------------------------------------
// Fetches /api/screenshot.png from the configured device URL (set in the
// "Device URL" input, persisted in localStorage). Same-origin CORS isn't
// possible since the plugin runs on the SignalK host and the device is on
// its own IP, but the device's web layer sets Access-Control-Allow-Origin:*
// so direct cross-origin fetch works. PNG body is small (~10-50 kB after
// the async migration + ROM-miniz encoder).
function setDeviceStatus (msg, kind) {
  const s = document.getElementById('device-status');
  s.textContent = msg || '';
  s.className = 'status ' + (kind || '');
}

async function fetchDevicePreview (why) {
  if (!state.deviceUrl) { setDeviceStatus('no device URL'); return; }
  let url = state.deviceUrl.trim().replace(/\/$/, '');
  if (!/^https?:\/\//.test(url)) url = 'http://' + url;
  setDeviceStatus('fetching ' + url + (why ? ' (' + why + ')' : '') + '…');
  // Bust browser cache so each refresh re-pulls. Route through the
  // plugin proxy so the browser doesn't have to share a network with
  // the device - the SignalK host does the fetch and streams the body
  // back same-origin to the editor.
  const stamp = Date.now();
  const proxyUrl = '/plugins/espdisp-manager/devices/proxy/screenshot.png?url=' +
                   encodeURIComponent(url) + '&t=' + stamp;
  try {
    const r = await fetch(proxyUrl, { cache: 'no-store' });
    if (!r.ok) {
      let detail = '';
      try { const j = await r.json(); detail = j.error || ''; } catch {}
      setDeviceStatus('proxy ' + r.status + (detail ? ' (' + detail + ')' : ''), 'err');
      return;
    }
    const blob = await r.blob();
    const objUrl = URL.createObjectURL(blob);
    const wrap = document.getElementById('device-preview');
    // Revoke any prior object URL to free memory before swapping in the new one.
    const prior = wrap.querySelector('img');
    if (prior && prior.dataset.objurl) URL.revokeObjectURL(prior.dataset.objurl);
    wrap.replaceChildren(
      el('div', { style: 'display:flex;align-items:flex-start;gap:12px;' },
        el('img', { src: objUrl, style: 'max-width:480px;border:1px solid var(--panel-edge);border-radius:4px;', alt: 'device frame' }),
        el('div', { style: 'color:var(--fg-dim);font-size:12px;' },
          el('div', null, 'fetched: ' + new Date(stamp).toLocaleTimeString()),
          el('div', null, 'size: ' + (blob.size / 1024).toFixed(1) + ' kB')))
    );
    wrap.querySelector('img').dataset.objurl = objUrl;
    setDeviceStatus('ok (' + (blob.size / 1024).toFixed(1) + ' kB)', 'ok');
  } catch (e) {
    setDeviceStatus('error: ' + e.message, 'err');
  }
}

function clearDevicePreview () {
  const wrap = document.getElementById('device-preview');
  const prior = wrap.querySelector('img');
  if (prior && prior.dataset.objurl) URL.revokeObjectURL(prior.dataset.objurl);
  wrap.replaceChildren();
  setDeviceStatus('');
}

// --- Wire up ------------------------------------------------------------

document.getElementById('profile-select').addEventListener('change', (e) => {
  if (state.dirty && !confirm('Discard unsaved changes?')) {
    e.target.value = state.profileId; return;
  }
  state.profileId = e.target.value;
  loadProfile();
});
document.getElementById('display-select').addEventListener('change', (e) => {
  state.displayClass = e.target.value;
  // Just re-render so tile grids reflow; don't touch the doc.
  renderScreens();
});
document.getElementById('reload-btn').addEventListener('click', () => {
  if (state.dirty && !confirm('Discard unsaved changes and reload?')) return;
  loadProfile();
});
document.getElementById('insert-preset-btn').addEventListener('click', openPresetPicker);
document.getElementById('add-empty-btn').addEventListener('click', addEmptyScreen);
document.getElementById('preset-close').addEventListener('click', () =>
  document.getElementById('preset-picker').classList.remove('show'));
document.getElementById('preset-picker').addEventListener('click', (e) => {
  if (e.target.id === 'preset-picker') e.target.classList.remove('show');
});
document.getElementById('save-btn').addEventListener('click', save);
// Device preview controls. URL persists in localStorage so the operator
// doesn't have to re-type after every page load.
{
  const urlInput = document.getElementById('device-url');
  state.deviceUrl = localStorage.getItem('espdisp.deviceUrl') || '';
  urlInput.value = state.deviceUrl;
  urlInput.addEventListener('change', () => {
    state.deviceUrl = urlInput.value.trim();
    localStorage.setItem('espdisp.deviceUrl', state.deviceUrl);
  });
  document.getElementById('device-refresh-btn').addEventListener('click', () => {
    state.deviceUrl = urlInput.value.trim();
    localStorage.setItem('espdisp.deviceUrl', state.deviceUrl);
    fetchDevicePreview('manual');
  });
  document.getElementById('device-clear-btn').addEventListener('click', clearDevicePreview);
}
window.addEventListener('beforeunload', (e) => {
  if (state.dirty) { e.preventDefault(); e.returnValue = ''; }
});

(async () => {
  await loadCatalogue();
  await loadProfileList();
  await loadProfile();
  // Auto-pull a device preview on load if a URL is persisted. Failure
  // is silent (the device-status indicator surfaces it).
  if (state.deviceUrl) fetchDevicePreview('initial');
})();
</script>
