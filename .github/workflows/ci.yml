name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - esp32-4848s040
          - esp32-4848s040-arduino
          - waveshare-touch-lcd-4
          - waveshare-touch-lcd-4_3
          - waveshare-touch-lcd-4_3b
          - waveshare-touch-lcd-5_800x480
          - waveshare-touch-lcd-5_1024x600
          - waveshare-touch-lcd-7_800x480
          - waveshare-touch-lcd-7b_1024x600
          - waveshare-knob-1_8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO and esptool
        run: pip install --upgrade platformio esptool

      - name: Check project version metadata
        run: python3 tools/check_version.py

      - name: Generate secrets.h
        env:
          ESPDISP_OTA_PASSWORD: ${{ secrets.ESPDISP_OTA_PASSWORD }}
        run: python3 tools/write_secrets_header.py

      - name: Build (${{ matrix.env }})
        run: pio run -e ${{ matrix.env }}

      - name: Create merged firmware image
        run: |
          BOOT_APP0=$(find "$HOME/.platformio/packages/framework-arduinoespressif32" -name boot_app0.bin -print -quit 2>/dev/null)
          if [ -z "$BOOT_APP0" ]; then
            echo "::error::boot_app0.bin not found under ~/.platformio/packages"
            exit 1
          fi
          esptool.py --chip esp32s3 merge_bin \
            -o ".pio/build/${{ matrix.env }}/merged_firmware.bin" \
            --flash_mode qio --flash_size 16MB \
            0x0     ".pio/build/${{ matrix.env }}/bootloader.bin" \
            0x8000  ".pio/build/${{ matrix.env }}/partitions.bin" \
            0xe000  "$BOOT_APP0" \
            0x10000 ".pio/build/${{ matrix.env }}/firmware.bin"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}-latest
          path: |
            .pio/build/${{ matrix.env }}/firmware.bin
            .pio/build/${{ matrix.env }}/firmware.elf
            .pio/build/${{ matrix.env }}/bootloader.bin
            .pio/build/${{ matrix.env }}/partitions.bin
            .pio/build/${{ matrix.env }}/merged_firmware.bin
          if-no-files-found: error
          retention-days: 14

  test:
    name: Native unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-native-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Check project version metadata
        run: python3 tools/check_version.py

      - name: Run host tests
        run: pio test -e native -v

  plugin-test:
    name: SignalK plugin tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: signalk/plugins/signalk-espdisp-manager
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20.10'
          cache: npm
          cache-dependency-path: signalk/plugins/signalk-espdisp-manager/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check project version metadata
        run: python3 ../../../tools/check_version.py

      - name: Install dependencies
        run: npm ci

      - name: Run plugin tests
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run plugin UI tests
        run: npm run test:playwright

      - name: Build plugin package
        run: |
          mkdir -p ../../../dist/signalk
          npm pack --pack-destination ../../../dist/signalk

      - name: Upload plugin package artifact
        uses: actions/upload-artifact@v4
        with:
          name: signalk-espdisp-manager-${{ github.sha }}
          path: dist/signalk/signalk-espdisp-manager-*.tgz
          if-no-files-found: error
          retention-days: 14

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Run shared pre-commit checks
        run: make pre-commit
