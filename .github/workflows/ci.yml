name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Create placeholder secrets.h
        run: cp include/secrets.h.example include/secrets.h

      - name: Build (esp32-4848s040)
        run: pio run -e esp32-4848s040

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            .pio/build/esp32-4848s040/firmware.bin
            .pio/build/esp32-4848s040/firmware.elf
            .pio/build/esp32-4848s040/bootloader.bin
            .pio/build/esp32-4848s040/partitions.bin
          if-no-files-found: error
          retention-days: 14

  test:
    name: Native unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-native-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run host tests
        run: pio test -e native -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: clang-format check
        uses: jidicula/clang-format-action@v4.13.0
        with:
          clang-format-version: '17'
          check-path: 'src include test'
          fallback-style: 'LLVM'

      - name: Python tools syntax
        run: python3 -m py_compile tools/*.py
