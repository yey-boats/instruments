name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - esp32-4848s040
          - esp32-4848s040-arduino
          - waveshare-touch-lcd-4
          - waveshare-touch-lcd-4_3
          - waveshare-touch-lcd-4_3b
          - waveshare-touch-lcd-5_800x480
          - waveshare-touch-lcd-5_1024x600
          - waveshare-touch-lcd-7_800x480
          - waveshare-touch-lcd-7b_1024x600
          - waveshare-knob-1_8
          # Headless protocol test harness (shares the full non-UI infra via
          # net::*; links via harness_stubs.cpp). In CI so a future infra change
          # that breaks the headless link is caught, not discovered at the bench.
          - harness-s3-devkitc
          - harness-s3-devkitc-ble
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO and esptool
        run: pip install --upgrade platformio esptool

      - name: Check project version metadata
        run: python3 tools/check_version.py

      - name: Resolve firmware version (MAJOR.MINOR.run_number)
        id: ver
        run: |
          set -euo pipefail
          MM=$(cut -d. -f1-2 VERSION)
          FW_VERSION="${MM}.${{ github.run_number }}"
          echo "fw_version=${FW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "::notice::firmware version ${FW_VERSION}"

      - name: Generate secrets.h
        env:
          YEYBOATS_OTA_PASSWORD: ${{ secrets.ESPDISP_OTA_PASSWORD }}
        run: python3 tools/write_secrets_header.py

      - name: Build (${{ matrix.env }})
        env:
          YEYBOATS_VERSION: ${{ steps.ver.outputs.fw_version }}
        run: pio run -e ${{ matrix.env }}

      - name: Create merged firmware image
        run: |
          BOOT_APP0=$(find "$HOME/.platformio/packages/framework-arduinoespressif32" -name boot_app0.bin -print -quit 2>/dev/null)
          if [ -z "$BOOT_APP0" ]; then
            echo "::error::boot_app0.bin not found under ~/.platformio/packages"
            exit 1
          fi
          esptool.py --chip esp32s3 merge_bin \
            -o ".pio/build/${{ matrix.env }}/merged_firmware.bin" \
            --flash_mode qio --flash_size 16MB \
            0x0     ".pio/build/${{ matrix.env }}/bootloader.bin" \
            0x8000  ".pio/build/${{ matrix.env }}/partitions.bin" \
            0xe000  "$BOOT_APP0" \
            0x10000 ".pio/build/${{ matrix.env }}/firmware.bin"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.env }}-latest
          path: |
            .pio/build/${{ matrix.env }}/firmware.bin
            .pio/build/${{ matrix.env }}/firmware.elf
            .pio/build/${{ matrix.env }}/bootloader.bin
            .pio/build/${{ matrix.env }}/partitions.bin
            .pio/build/${{ matrix.env }}/merged_firmware.bin
          if-no-files-found: error
          retention-days: 14

  test:
    name: Native unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-native-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Check project version metadata
        run: python3 tools/check_version.py

      - name: Run host tests
        run: pio test -e native -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Run shared pre-commit checks
        run: make pre-commit

  proto-freshness:
    name: Proto generated files freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Regenerate protocol code
        run: make proto

      - name: Check generated files are up to date
        run: git diff --exit-code include/proto/records_generated.h proto/js/types.d.ts

  # Rolling "tip" prerelease: after the matrix build + tests + lint pass on a
  # push to main, build the 8 shippable targets, merge them, and force-update a
  # single GitHub release tagged `tip`. The SignalK manager lists this as the
  # TIP build alongside the formal RELEASES from release.yml. Never runs on PRs
  # or forks (guarded on push + ref + same-repo).
  tip:
    name: Rolling tip prerelease
    needs: [build, test, lint]
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.repository == 'yey-boats/instruments'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # CI run number is the BUILD component, matching the matrix build above.
      RUN_NUMBER: ${{ github.run_number }}
      SHORT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-tip-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO and esptool
        run: pip install --upgrade platformio esptool

      - name: Check project version metadata
        run: python3 tools/check_version.py

      - name: Resolve firmware version (MAJOR.MINOR.run_number)
        id: ver
        run: |
          set -euo pipefail
          MM=$(cut -d. -f1-2 VERSION)
          echo "fw_version=${MM}.${RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Generate secrets.h
        env:
          YEYBOATS_OTA_PASSWORD: ${{ secrets.ESPDISP_OTA_PASSWORD }}
        run: python3 tools/write_secrets_header.py

      - name: Build shippable firmware environments
        env:
          YEYBOATS_VERSION: ${{ steps.ver.outputs.fw_version }}
        run: |
          set -euo pipefail
          mkdir -p release-staging
          targets=(
            esp32-4848s040:esp32-4848s040
            waveshare-touch-lcd-4:waveshare-touch-lcd-4
            waveshare-touch-lcd-4_3:waveshare-touch-lcd-4_3
            waveshare-touch-lcd-4_3b:waveshare-touch-lcd-4_3b
            waveshare-touch-lcd-5_800x480:waveshare-touch-lcd-5_800x480
            waveshare-touch-lcd-5_1024x600:waveshare-touch-lcd-5_1024x600
            waveshare-touch-lcd-7_800x480:waveshare-touch-lcd-7_800x480
            waveshare-touch-lcd-7b_1024x600:waveshare-touch-lcd-7b_1024x600
          )
          for entry in "${targets[@]}"; do
            public="${entry%%:*}"
            env="${entry##*:}"
            pio run -e "$env"
            cp ".pio/build/$env/bootloader.bin" "release-staging/$public-bootloader.bin"
            cp ".pio/build/$env/partitions.bin" "release-staging/$public-partitions.bin"
            cp ".pio/build/$env/firmware.bin"   "release-staging/$public-firmware.bin"
            cp ".pio/build/$env/firmware.elf"   "release-staging/$public-firmware.elf"
          done

      - name: Merge bootloader+partitions+firmware per env
        run: |
          set -euo pipefail
          out="release-staging"
          BOOT_APP0=$(find "$HOME/.platformio/packages/framework-arduinoespressif32" -name boot_app0.bin -print -quit 2>/dev/null)
          if [ -z "$BOOT_APP0" ]; then
            echo "::error::boot_app0.bin not found under ~/.platformio/packages"
            exit 1
          fi
          for f in "$out"/*-firmware.bin; do
            base="${f##*/}"
            public="${base%-firmware.bin}"
            esptool.py --chip esp32s3 merge_bin \
              -o "$out/$public-merged_firmware.bin" \
              --flash_mode qio --flash_size 16MB \
              0x0     "$out/$public-bootloader.bin" \
              0x8000  "$out/$public-partitions.bin" \
              0xe000  "$BOOT_APP0" \
              0x10000 "$out/$public-firmware.bin"
          done
          ls -la "$out"

      - name: Generate checksums
        run: |
          ( cd release-staging && sha256sum *.bin *.elf > SHA256SUMS )

      - name: Generate tip release notes
        env:
          FW_VERSION: ${{ steps.ver.outputs.fw_version }}
        run: |
          set -euo pipefail
          short="${SHORT_SHA:0:7}"
          {
            echo "Rolling **tip** prerelease built from \`main\` @ \`${short}\`."
            echo ""
            echo "- Firmware version: \`${FW_VERSION}\` (MAJOR.MINOR from VERSION, BUILD = CI run number)"
            echo "- Commit: \`${SHORT_SHA}\`"
            echo ""
            echo "This is an unstable, continuously-updated build. For stable"
            echo "firmware use a tagged release (\`v*\`) instead."
            echo ""
            echo "Download the merged image for your board target and flash at 0x0."
          } > tip_notes.md
          cat tip_notes.md

      - name: Move tip tag to current commit
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f tip "$SHORT_SHA"
          git push -f origin tip

      - name: Publish rolling tip release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: tip
          name: tip (main @ ${{ github.sha }})
          body_path: tip_notes.md
          files: |
            release-staging/*-merged_firmware.bin
            release-staging/SHA256SUMS
          draft: false
          prerelease: true
          make_latest: false
