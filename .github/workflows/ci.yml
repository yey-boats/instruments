name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Check project version metadata
        run: python3 tools/check_version.py

      - name: Create placeholder secrets.h
        run: cp include/secrets.h.example include/secrets.h

      - name: Build (esp32-4848s040)
        run: pio run -e esp32-4848s040

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            .pio/build/esp32-4848s040/firmware.bin
            .pio/build/esp32-4848s040/firmware.elf
            .pio/build/esp32-4848s040/bootloader.bin
            .pio/build/esp32-4848s040/partitions.bin
          if-no-files-found: error
          retention-days: 14

  test:
    name: Native unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-native-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Check project version metadata
        run: python3 tools/check_version.py

      - name: Run host tests
        run: pio test -e native -v

  plugin-test:
    name: SignalK plugin tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: signalk/plugins/signalk-espdisp-manager
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20.10'
          cache: npm
          cache-dependency-path: signalk/plugins/signalk-espdisp-manager/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check project version metadata
        run: python3 ../../../tools/check_version.py

      - name: Install dependencies
        run: npm ci

      - name: Run plugin tests
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run plugin UI tests
        run: npm run test:playwright

      - name: Build plugin package
        run: |
          mkdir -p ../../../dist/signalk
          npm pack --pack-destination ../../../dist/signalk

      - name: Upload plugin package artifact
        uses: actions/upload-artifact@v4
        with:
          name: signalk-espdisp-manager-${{ github.sha }}
          path: dist/signalk/signalk-espdisp-manager-*.tgz
          if-no-files-found: error
          retention-days: 14

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: clang-format check
        uses: jidicula/clang-format-action@v4.13.0
        with:
          clang-format-version: '17'
          check-path: 'src include test'
          fallback-style: 'LLVM'

      - name: Python tools syntax
        run: |
          python3 -m py_compile tools/*.py
          python3 tools/check_version.py
