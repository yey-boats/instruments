name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-release-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO and esptool
        run: pip install --upgrade platformio esptool

      - name: Check project version metadata
        run: |
          python3 tools/check_version.py
          # MAJOR.MINOR is the repo-configured source of truth and must match
          # the tag. The tag's BUILD (third component) is authoritative for a
          # formal release -- it is NOT required to match the VERSION file's
          # placeholder 0 (the VERSION file pins MAJOR.MINOR.0; CI/the tag own
          # BUILD). So we compare only MAJOR.MINOR here.
          repo_mm=$(cut -d. -f1-2 VERSION)
          tag_mm=$(printf '%s' "${TAG_NAME#v}" | cut -d. -f1-2)
          test "$repo_mm" = "$tag_mm" || {
            echo "::error::tag MAJOR.MINOR (${tag_mm}) must match VERSION file (${repo_mm}); the tag's BUILD is authoritative"
            exit 1
          }

      - name: Generate release secrets.h
        env:
          YEYBOATS_OTA_PASSWORD: ${{ secrets.YEYBOATS_OTA_PASSWORD }}
        run: python3 tools/write_secrets_header.py --require-ota-password

      - name: Build supported firmware environments
        run: |
          set -euo pipefail
          # Stage each env's artifacts IMMEDIATELY after building - the
          # previous flow (build all, then cp at the end) lost the first
          # env's bootloader.bin somewhere between the build step and
          # the stage step (only release-esp32-4848s040 was ever
          # affected; all 7 waveshare envs had complete artifacts at
          # stage time). Whatever was wiping the sunton build dir
          # can't get at the files once they live under release-staging.
          mkdir -p release-staging
          targets=(
            esp32-4848s040:release-esp32-4848s040
            waveshare-touch-lcd-4:release-waveshare-touch-lcd-4
            waveshare-touch-lcd-4_3:release-waveshare-touch-lcd-4_3
            waveshare-touch-lcd-4_3b:release-waveshare-touch-lcd-4_3b
            waveshare-touch-lcd-5_800x480:release-waveshare-touch-lcd-5_800x480
            waveshare-touch-lcd-5_1024x600:release-waveshare-touch-lcd-5_1024x600
            waveshare-touch-lcd-7_800x480:release-waveshare-touch-lcd-7_800x480
            waveshare-touch-lcd-7b_1024x600:release-waveshare-touch-lcd-7b_1024x600
          )
          for entry in "${targets[@]}"; do
            public="${entry%%:*}"
            env="${entry##*:}"
            YEYBOATS_VERSION="${TAG_NAME#v}" pio run -e "$env"
            # Snapshot artifacts immediately. cp errors out (set -e) if
            # anything is missing, so a missing bootloader.bin fails the
            # right env's step rather than 10 minutes later.
            cp ".pio/build/$env/bootloader.bin" "release-staging/$public-bootloader.bin"
            cp ".pio/build/$env/partitions.bin" "release-staging/$public-partitions.bin"
            cp ".pio/build/$env/firmware.bin"   "release-staging/$public-firmware.bin"
            cp ".pio/build/$env/firmware.elf"   "release-staging/$public-firmware.elf"
          done

      - name: Merge bootloader+partitions+firmware per env
        run: |
          set -euo pipefail
          out="release-staging"
          BOOT_APP0=$(find "$HOME/.platformio/packages/framework-arduinoespressif32" -name boot_app0.bin -print -quit 2>/dev/null)
          if [ -z "$BOOT_APP0" ]; then
            echo "::error::boot_app0.bin not found under ~/.platformio/packages"
            exit 1
          fi
          echo "Using boot_app0.bin from: $BOOT_APP0"
          for f in "$out"/*-firmware.bin; do
            base="${f##*/}"
            public="${base%-firmware.bin}"
            esptool.py --chip esp32s3 merge_bin \
              -o "$out/$public-merged_firmware.bin" \
              --flash_mode qio --flash_size 16MB \
              0x0     "$out/$public-bootloader.bin" \
              0x8000  "$out/$public-partitions.bin" \
              0xe000  "$BOOT_APP0" \
              0x10000 "$out/$public-firmware.bin"
          done
          ls -la "$out"

      - name: Generate checksums
        run: |
          ( cd release-staging && sha256sum *.bin *.elf > SHA256SUMS )
          ls -la release-staging

      - name: Generate release notes
        run: |
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "## Changes"
            echo ""
            if [ -n "$prev" ]; then
              git log --pretty=format:'- %s (%h)' "$prev"..HEAD
            else
              git log --pretty=format:'- %s (%h)'
            fi
            echo ""
            echo ""
            echo "## Flash instructions"
            echo ""
            echo "Download the merged firmware image for your board target:"
            echo ""
            echo "- \`esp32-4848s040-merged_firmware.bin\`"
            echo "- \`waveshare-touch-lcd-4-merged_firmware.bin\`"
            echo "- \`waveshare-touch-lcd-4_3-merged_firmware.bin\`"
            echo "- \`waveshare-touch-lcd-4_3b-merged_firmware.bin\`"
            echo "- \`waveshare-touch-lcd-5_800x480-merged_firmware.bin\`"
            echo "- \`waveshare-touch-lcd-5_1024x600-merged_firmware.bin\`"
            echo "- \`waveshare-touch-lcd-7_800x480-merged_firmware.bin\`"
            echo "- \`waveshare-touch-lcd-7b_1024x600-merged_firmware.bin\`"
            echo ""
            echo 'Single-file flash (covers bootloader, partition table, OTA boot selector, and app):'
            echo ""
            echo '```sh'
            echo "esptool.py --chip esp32s3 --port /dev/cu.usbserial-* write_flash 0x0 <target>-merged_firmware.bin"
            echo '```'
            echo ""
            echo 'Or via authenticated OTA once the device is on the network:'
            echo ""
            echo '```sh'
            echo "YEYBOATS_OTA_PASSWORD='<ota-password>' make ota DEVICE_IP=<device-ip>"
            echo '```'
            echo ""
            echo "## SignalK plugin"
            echo ""
            echo "The SignalK manager plugin is released separately from the"
            echo "**yey-boats/Instruments-manager** repository."
          } > release_notes.md
          cat release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          body_path: release_notes.md
          files: |
            release-staging/*.bin
            release-staging/*.elf
            release-staging/SHA256SUMS
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
