name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v6
        with:
          node-version: '20.10'
          cache: npm
          cache-dependency-path: signalk/plugins/signalk-espdisp-manager/package-lock.json

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-release-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO and esptool
        run: pip install --upgrade platformio esptool

      - name: Check project version metadata
        run: |
          python3 tools/check_version.py
          test "$(cat VERSION)" = "${TAG_NAME#v}" || {
            echo "::error::VERSION must match release tag ${TAG_NAME}"
            exit 1
          }

      - name: Create placeholder secrets.h
        run: cp include/secrets.h.example include/secrets.h

      - name: Build supported firmware environments
        run: |
          set -euo pipefail
          targets=(
            release-esp32-4848s040
            release-waveshare-touch-lcd-4
            release-waveshare-touch-lcd-4_3
            release-waveshare-touch-lcd-4_3b
            release-waveshare-touch-lcd-5_800x480
            release-waveshare-touch-lcd-5_1024x600
            release-waveshare-touch-lcd-7_800x480
            release-waveshare-touch-lcd-7b_1024x600
          )
          for env in "${targets[@]}"; do
            ESPDISP_VERSION="${TAG_NAME#v}" pio run -e "$env"
          done

      - name: Stage release artifacts
        run: |
          set -euo pipefail
          out="release-staging"
          mkdir -p "$out"
          BOOT_APP0=$(find "$HOME/.platformio/packages/framework-arduinoespressif32" -name boot_app0.bin -print -quit 2>/dev/null)
          if [ -z "$BOOT_APP0" ]; then
            echo "::error::boot_app0.bin not found under ~/.platformio/packages"
            exit 1
          fi
          echo "Using boot_app0.bin from: $BOOT_APP0"
          # Diagnostic: list everything PIO produced. v0.3.1 failed here
          # because the cp couldn't find bootloader.bin under
          # .pio/build/release-esp32-4848s040/ - the build log shows it
          # WAS produced, so we need to see the actual on-disk layout
          # before the next attempt to know whether PIO 6.1.19 + this
          # arduino-espressif32 version puts it elsewhere now.
          echo "== .pio/build tree =="
          find .pio/build -maxdepth 2 -type f \( -name '*.bin' -o -name '*.elf' \) | sort || true
          echo "== end =="
          targets=(
            esp32-4848s040:release-esp32-4848s040
            waveshare-touch-lcd-4:release-waveshare-touch-lcd-4
            waveshare-touch-lcd-4_3:release-waveshare-touch-lcd-4_3
            waveshare-touch-lcd-4_3b:release-waveshare-touch-lcd-4_3b
            waveshare-touch-lcd-5_800x480:release-waveshare-touch-lcd-5_800x480
            waveshare-touch-lcd-5_1024x600:release-waveshare-touch-lcd-5_1024x600
            waveshare-touch-lcd-7_800x480:release-waveshare-touch-lcd-7_800x480
            waveshare-touch-lcd-7b_1024x600:release-waveshare-touch-lcd-7b_1024x600
          )
          for entry in "${targets[@]}"; do
            public="${entry%%:*}"
            env="${entry##*:}"
            # Bootloader naming changed in arduino-espressif32 3.x: the
            # per-env bootloader.bin may not be regenerated if a cached
            # one from the framework matches. Fall back to the framework
            # default if the per-env copy is missing.
            if [ -f ".pio/build/$env/bootloader.bin" ]; then
              cp ".pio/build/$env/bootloader.bin" "$out/$public-bootloader.bin"
            else
              fwbl=$(find "$HOME/.platformio/packages/framework-arduinoespressif32/tools/sdk/esp32s3/bin" \
                       -name 'bootloader_qio_80m.bin' -print -quit 2>/dev/null)
              if [ -z "$fwbl" ]; then
                echo "::error::no bootloader.bin for $env and no framework fallback"
                exit 1
              fi
              echo "fallback bootloader for $env: $fwbl"
              cp "$fwbl" "$out/$public-bootloader.bin"
            fi
            cp ".pio/build/$env/partitions.bin" "$out/$public-partitions.bin"
            cp ".pio/build/$env/firmware.bin"   "$out/$public-firmware.bin"
            cp ".pio/build/$env/firmware.elf"   "$out/$public-firmware.elf"
            esptool.py --chip esp32s3 merge_bin \
              -o "$out/$public-merged_firmware.bin" \
              --flash_mode qio --flash_size 16MB \
              0x0     "$out/$public-bootloader.bin" \
              0x8000  "$out/$public-partitions.bin" \
              0xe000  "$BOOT_APP0" \
              0x10000 "$out/$public-firmware.bin"
          done
          ls -la "$out"

      - name: Package SignalK plugin
        working-directory: signalk/plugins/signalk-espdisp-manager
        run: |
          npm ci
          npm test
          npx playwright install --with-deps chromium
          npm run test:playwright
          npm pack --pack-destination ../../../release-staging

      - name: Generate checksums
        run: |
          ( cd release-staging && sha256sum *.bin *.elf *.tgz > SHA256SUMS )
          ls -la release-staging

      - name: Generate release notes
        run: |
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "## Changes"
            echo ""
            if [ -n "$prev" ]; then
              git log --pretty=format:'- %s (%h)' "$prev"..HEAD
            else
              git log --pretty=format:'- %s (%h)'
            fi
            echo ""
            echo ""
            echo "## Flash instructions"
            echo ""
            echo "Download the merged firmware image for your board target:"
            echo ""
            echo "- \`esp32-4848s040-merged_firmware.bin\`"
            echo "- \`waveshare-touch-lcd-4-merged_firmware.bin\`"
            echo "- \`waveshare-touch-lcd-4_3-merged_firmware.bin\`"
            echo "- \`waveshare-touch-lcd-4_3b-merged_firmware.bin\`"
            echo "- \`waveshare-touch-lcd-5_800x480-merged_firmware.bin\`"
            echo "- \`waveshare-touch-lcd-5_1024x600-merged_firmware.bin\`"
            echo "- \`waveshare-touch-lcd-7_800x480-merged_firmware.bin\`"
            echo "- \`waveshare-touch-lcd-7b_1024x600-merged_firmware.bin\`"
            echo ""
            echo 'Single-file flash (covers bootloader, partition table, OTA boot selector, and app):'
            echo ""
            echo '```sh'
            echo "esptool.py --chip esp32s3 --port /dev/cu.usbserial-* write_flash 0x0 <target>-merged_firmware.bin"
            echo '```'
            echo ""
            echo 'Or via PlatformIO OTA once the device is on the network:'
            echo ""
            echo '```sh'
            echo "pio run -e ota -t upload --upload-port <device-ip>"
            echo '```'
            echo ""
            echo "## SignalK plugin"
            echo ""
            echo "Download the matching plugin package release asset:"
            echo ""
            echo '- `signalk-espdisp-manager-${TAG_NAME#v}.tgz`'
            echo ""
            echo 'Install it on the SignalK server:'
            echo ""
            echo '```sh'
            echo "cd ~/.signalk"
            echo "npm install /path/to/signalk-espdisp-manager-${TAG_NAME#v}.tgz"
            echo '```'
            echo ""
            echo "Then restart SignalK and enable ESP Display Manager in the admin plugin UI."
          } > release_notes.md
          cat release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          body_path: release_notes.md
          files: |
            release-staging/*.bin
            release-staging/*.elf
            release-staging/*.tgz
            release-staging/SHA256SUMS
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
