; Headless protocol test harness on a bare ESP32-S3-DevKitC-1. No display,
; no LVGL/touch. It now sits on the SAME base infrastructure as the main
; firmware: net::setup()/net::loop() bring up the WiFi manager, ArduinoOTA
; (<deviceId>.local:3232), BLE NUS + CONNECTION, mDNS, and the dispatchCommand
; console funnel. That makes the harness OTA-updatable and reconfigurable over
; BLE/serial without a reflash.
;
; build_src_filter approach: include the full non-UI source set (+<*>) then
; EXCLUDE every TU that pulls in LVGL / Arduino_GFX (main.cpp, src/ui/*, the
; display/touch/screenshot/web/knob-LVGL TUs). harness_main.cpp + harness_stubs.cpp
; replace them; harness_stubs.cpp no-ops the handful of ui:: / knob_ui:: /
; manager_screens:: symbols the linked infra references. lib_deps therefore needs
; the full infra set (ArduinoJson, WebSockets, NimBLE) but NOT lvgl / GFX.
[env:harness-s3-devkitc]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
; DevKitC-1 N16R8 = octal PSRAM; the qio_opi memory_type makes the early-boot
; PSRAM cache config match the octal part. Without it the app faults at entry
; (deterministic reset before any console output). Matches the base board env.
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -I include
    ; Headless-only <lvgl.h> shim so infra headers (ui_screens.h / ui_theme.h /
    ; widget_registry.h) parse without linking LVGL. See harness_shim/lvgl.h.
    -I harness_shim
    -DCORE_DEBUG_LEVEL=3
    -D ESPDISP_HARNESS=1
build_src_filter =
    +<*>
    -<main.cpp>
    -<ui/>
    -<fonts/>
    -<font_resolver_lvgl.cpp>
    -<knob_input.cpp>
    -<lvgl_alloc.cpp>
    -<layout_renderer.cpp>
    -<manager_screens.cpp>
    -<screenshot.cpp>
    -<touch_cal.cpp>
    -<web.cpp>
    -<widget_registry.cpp>
    +<harness_main.cpp>
    +<harness_stubs.cpp>
lib_deps =
    bblanchon/ArduinoJson@^7.2.0
    links2004/WebSockets@^2.4.1
    h2zero/NimBLE-Arduino@^1.4.2
monitor_speed = 115200
extra_scripts = pre:tools/version.py

; BLE-central variant of the harness: same headless DevKitC build on the same
; base infra, but loop() runs the on-demand NimBLE central soak (scan -> connect
; -> attach -> switch -> detach -> disconnect) instead of the IP cycle.
; -D HARNESS_BLE selects it. Build with: pio run -e harness-s3-devkitc-ble
[env:harness-s3-devkitc-ble]
extends = env:harness-s3-devkitc
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -I include
    -I harness_shim
    -DCORE_DEBUG_LEVEL=3
    -D ESPDISP_HARNESS=1
    -D HARNESS_BLE=1

; OTA variants of the harness: flash the headless DevKitC over WiFi like the
; main firmware (ArduinoOTA is wired by net::setup at <deviceId>.local:3232).
;   pio run -e ota-harness-s3-devkitc -t upload --upload-port <harness-ip>
;   (or: make ota ENV=ota-harness-s3-devkitc DEVICE_IP=<harness-ip>)
[env:ota-harness-s3-devkitc]
extends = env:harness-s3-devkitc
upload_protocol = espota
upload_flags =
    --port=3232

[env:ota-harness-s3-devkitc-ble]
extends = env:harness-s3-devkitc-ble
upload_protocol = espota
upload_flags =
    --port=3232

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = -<*> +<signalk_parser.cpp> +<layout.cpp> +<boat_data.cpp> +<nmea0183_parser.cpp> +<autopilot_pure.cpp> +<manager_config.cpp> +<font_resolver.cpp> +<widget_data_resolver.cpp> +<boards/board_common.cpp> +<boards/board_native_fake.cpp> +<ui/layout_context.cpp> +<manager_url.cpp> +<manager_endpoint.cpp> +<error_log.cpp> +<hostname_check.cpp> +<ui_config_check.cpp> +<sources_check.cpp> +<log_level_check.cpp> +<device_discovery.cpp> +<net_health.cpp> +<knob_menu.cpp> +<proto/proto.cpp> +<path_store.cpp> +<bench_row.cpp> +<capabilities.cpp> +<subscription_set.cpp> +<config_persist.cpp> +<marker_math.cpp>
build_flags =
    -std=c++17
    -I include
    -DUNITY_INCLUDE_DOUBLE
    -DUNITY_DOUBLE_PRECISION=1e-12
    -DARDUINOJSON_USE_DOUBLE=1
    -DBOARD_ID_DEFINED
    -DBOARD_ID_NATIVE_FAKE
lib_deps =
    bblanchon/ArduinoJson@^7.2.0
test_filter =
    test_parser
    test_layout
    test_boat_data
    test_nmea0183
    test_autopilot
    test_manager_config
    test_font_resolver
    test_widget_data
    test_board
    test_ota_pass
    test_manager_url
    test_manager_endpoint
    test_error_log
    test_hostname_check
    test_ui_config_check
    test_sources_check
    test_log_level_check
    test_device_discovery
    test_knob_menu
    test_proto
    test_path_store
    test_bench_row
    test_capabilities
    test_subscription_set
    test_config_persist
    test_zoom
    test_marker_math

; ---------------------------------------------------------------------------
; Resolution test harness (host, headless LVGL). Renders the real ui_layouts
; code at a build-defined resolution and snapshots a BMP. Run per display
; class via tools/sim_render.sh (pass -DSIM_LCD_W/-DSIM_LCD_H). No SDL needed.
[env:sim]
platform = native
lib_deps =
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.2.0
build_flags =
    -std=gnu++17
    -DARDUINO=10805
    ; ARDUINO is defined so autopilot.h's API is declared, but keep ArduinoJson
    ; off the Arduino (Stream/Print/Flash) path so it stays host-clean.
    -DARDUINOJSON_ENABLE_ARDUINO_STRING=0
    -DARDUINOJSON_ENABLE_ARDUINO_STREAM=0
    -DARDUINOJSON_ENABLE_ARDUINO_PRINT=0
    -DARDUINOJSON_ENABLE_PROGMEM=0
    -DLV_CONF_INCLUDE_SIMPLE
    -I sim
    -I include
    -include sim/esp_heap_caps.h
build_src_filter =
    -<*>
    +<ui/ui_layouts.cpp>
    +<ui/ui_markers.cpp>
    +<marker_math.cpp>
    +<ui/ui_theme.cpp>
    +<layout.cpp>
    +<subscription_set.cpp>
    +<autopilot_pure.cpp>
    +<fonts/font_xl_64.c>
    +<../sim/sim_main.cpp>
    +<../sim/stubs.cpp>

; Same headless host harness as [env:sim], but renders the fullscreen wind dial
; (src/ui/screen_wind.cpp) instead of the dashboard tiles, so the A / T wind
; indices and the current arrow can be eyeballed without a panel.
