[release_common]
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D BOARD_HAS_PSRAM
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -I include
    -DCORE_DEBUG_LEVEL=0
    -D BOARD_ID_DEFINED
    -D ESPDISP_RELEASE_BUILD=1
    -D ESPDISP_ENABLE_INPUT_TEST=0
    -D ESPDISP_ENABLE_BENCH=0
    -D ESPDISP_ENABLE_DEMO=0
    -D ESPDISP_ENABLE_STALL_TELEMETRY=0
    -D ESPDISP_ENABLE_TOUCH_CAL_UI=0

[release_waveshare_common]
build_flags =
    ${release_common.build_flags}
    -D ENABLE_NMEA2000
    -D TOUCH_INT=16
    -D TOUCH_INT_ACTIVE_LOW=1

[env:release-esp32-4848s040]
extends = env:esp32-4848s040
build_flags =
    ${release_common.build_flags}
    -D BOARD_ID_SUNTON_4848S040

[env:release-waveshare-touch-lcd-4]
