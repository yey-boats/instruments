    -include sim/esp_heap_caps.h
build_src_filter =
    -<*>
    +<ui/knob_ui.cpp>
    +<ui/ui_theme.cpp>
    +<knob_menu.cpp>
    +<fonts/font_xl_64.c>
    +<../sim/sim_knob.cpp>
    +<../sim/stubs_knob.cpp>

; Same headless host harness, but renders the REAL "controlled" frame overlay
; (src/ui/control_frame.cpp: ui::control_frame::build + set_sessions) driven by
; synthetic proto::Session structs. Shape (rect 480x480 / round 360x360) and the
; active-session count are runtime argv, so one binary covers both panels:
;   pio run -e sim-control && .pio/build/sim-control/program rect 3 out.bmp
[env:sim-control]
platform = native
lib_deps =
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.2.0
build_flags =
    -std=gnu++17
    -DARDUINO=10805
    -DARDUINOJSON_ENABLE_ARDUINO_STRING=0
    -DARDUINOJSON_ENABLE_ARDUINO_STREAM=0
    -DARDUINOJSON_ENABLE_ARDUINO_PRINT=0
    -DARDUINOJSON_ENABLE_PROGMEM=0
    -DLV_CONF_INCLUDE_SIMPLE
    -DSIM_LCD_W=480
    -DSIM_LCD_H=480
    -I sim
    -I include
    -include sim/esp_heap_caps.h
build_src_filter =
    -<*>
    +<ui/control_frame.cpp>
    +<ui/ui_theme.cpp>
    +<proto/proto.cpp>
    +<../sim/sim_control.cpp>
