; Headless protocol test harness on a bare ESP32-S3-DevKitC-1. No display,
; no LVGL/touch — a controller that loops protocol commands at a target.
[env:harness-s3-devkitc]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -I include
    -DCORE_DEBUG_LEVEL=3
    -D ESPDISP_HARNESS=1
build_src_filter =
    -<*>
    +<harness_main.cpp>
    +<proto/proto.cpp>
    +<proto_ip.cpp>
lib_deps =
    bblanchon/ArduinoJson@^7.2.0
    links2004/WebSockets@^2.4.1
    h2zero/NimBLE-Arduino@^1.4.2
monitor_speed = 115200

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = -<*> +<signalk_parser.cpp> +<layout.cpp> +<boat_data.cpp> +<nmea0183_parser.cpp> +<autopilot_pure.cpp> +<manager_config.cpp> +<font_resolver.cpp> +<widget_data_resolver.cpp> +<boards/board_common.cpp> +<boards/board_native_fake.cpp> +<ui/layout_context.cpp> +<manager_url.cpp> +<manager_endpoint.cpp> +<error_log.cpp> +<hostname_check.cpp> +<ui_config_check.cpp> +<sources_check.cpp> +<log_level_check.cpp> +<device_discovery.cpp> +<net_health.cpp> +<knob_menu.cpp> +<proto/proto.cpp>
build_flags =
    -std=c++17
    -I include
    -DUNITY_INCLUDE_DOUBLE
    -DUNITY_DOUBLE_PRECISION=1e-12
    -DARDUINOJSON_USE_DOUBLE=1
    -DBOARD_ID_DEFINED
    -DBOARD_ID_NATIVE_FAKE
lib_deps =
    bblanchon/ArduinoJson@^7.2.0
test_filter =
    test_parser
    test_layout
    test_boat_data
    test_nmea0183
    test_autopilot
    test_manager_config
    test_font_resolver
    test_widget_data
    test_board
    test_manager_url
    test_manager_endpoint
    test_error_log
    test_hostname_check
    test_ui_config_check
    test_sources_check
    test_log_level_check
    test_device_discovery
    test_knob_menu
    test_proto

; ---------------------------------------------------------------------------
; Resolution test harness (host, headless LVGL). Renders the real ui_layouts
; code at a build-defined resolution and snapshots a BMP. Run per display
; class via tools/sim_render.sh (pass -DSIM_LCD_W/-DSIM_LCD_H). No SDL needed.
[env:sim]
platform = native
lib_deps =
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.2.0
build_flags =
    -std=gnu++17
    -DARDUINO=10805
    ; ARDUINO is defined so autopilot.h's API is declared, but keep ArduinoJson
    ; off the Arduino (Stream/Print/Flash) path so it stays host-clean.
    -DARDUINOJSON_ENABLE_ARDUINO_STRING=0
    -DARDUINOJSON_ENABLE_ARDUINO_STREAM=0
    -DARDUINOJSON_ENABLE_ARDUINO_PRINT=0
    -DARDUINOJSON_ENABLE_PROGMEM=0
    -DLV_CONF_INCLUDE_SIMPLE
    -I sim
    -I include
    -include sim/esp_heap_caps.h
build_src_filter =
    -<*>
    +<ui/ui_layouts.cpp>
    +<ui/ui_theme.cpp>
    +<autopilot_pure.cpp>
    +<fonts/font_xl_64.c>
    +<../sim/sim_main.cpp>
    +<../sim/stubs.cpp>

; Same headless host harness as [env:sim], but renders the fullscreen wind dial
; (src/ui/screen_wind.cpp) instead of the dashboard tiles, so the A / T wind
; indices and the current arrow can be eyeballed without a panel.
;   pio run -e sim-wind && .pio/build/sim-wind/program docs/sim-shots/wind.bmp
[env:sim-wind]
platform = native
lib_deps =
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.2.0
build_flags =
    -std=gnu++17
    -DARDUINO=10805
    -DARDUINOJSON_ENABLE_ARDUINO_STRING=0
    -DARDUINOJSON_ENABLE_ARDUINO_STREAM=0
    -DARDUINOJSON_ENABLE_ARDUINO_PRINT=0
    -DARDUINOJSON_ENABLE_PROGMEM=0
    -DLV_CONF_INCLUDE_SIMPLE
    -I sim
    -I include
    -include sim/esp_heap_caps.h
build_src_filter =
    -<*>
    +<ui/screen_wind.cpp>
    +<ui/ui_theme.cpp>
    +<fonts/font_xl_64.c>
    +<../sim/sim_wind.cpp>
    +<../sim/stubs.cpp>

; Same headless host harness, but renders the Waveshare-knob round views
; (src/ui/knob_ui.cpp: ap_hud / compass / wind / big) at 360x360 with the
; board id defined so the board-gated dedicated views compile. The view is
; chosen at runtime (argv[1]); see tools/sim_render.sh for the gallery loop.
;   pio run -e sim-knob && .pio/build/sim-knob/program ap_hud docs/sim-shots/knob-ap_hud.bmp
[env:sim-knob]
platform = native
lib_deps =
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.2.0
build_flags =
    -std=gnu++17
    -DARDUINO=10805
    -DARDUINOJSON_ENABLE_ARDUINO_STRING=0
    -DARDUINOJSON_ENABLE_ARDUINO_STREAM=0
    -DARDUINOJSON_ENABLE_ARDUINO_PRINT=0
    -DARDUINOJSON_ENABLE_PROGMEM=0
    -DLV_CONF_INCLUDE_SIMPLE
    -DBOARD_ID_DEFINED
    -DBOARD_ID_WAVESHARE_KNOB_1_8
    -DSIM_LCD_W=360
    -DSIM_LCD_H=360
    -I sim
    -I include
    -include sim/esp_heap_caps.h
build_src_filter =
    -<*>
    +<ui/knob_ui.cpp>
    +<ui/ui_theme.cpp>
    +<knob_menu.cpp>
    +<fonts/font_xl_64.c>
    +<../sim/sim_knob.cpp>
    +<../sim/stubs_knob.cpp>
