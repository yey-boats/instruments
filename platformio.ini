; PlatformIO project for esp32-boat-mfd
; https://github.com/navado/esp32-boat-mfd
;
; SPDX-License-Identifier: PolyForm-Noncommercial-1.0.0
;
; Envs:
;   esp32-4848s040  - production firmware build (Sunton ESP32-4848S040)
;   ota             - extends above; sets upload_protocol=espota. Pass IP at runtime:
;                       pio run -e ota -t upload --upload-port <ip>
;   native          - host-side unit tests for the SignalK delta parser

[env:esp32-4848s040]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
framework = arduino

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D BOARD_HAS_PSRAM
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -I include
    -DCORE_DEBUG_LEVEL=3
    -D BOARD_ID_DEFINED
    -D BOARD_ID_SUNTON_4848S040

monitor_speed = 115200
upload_speed = 115200

lib_deps =
    moononournation/GFX Library for Arduino@~1.4.7
    lvgl/lvgl@^9.2.0
    https://github.com/TAMCTec/gt911-arduino.git
    h2zero/NimBLE-Arduino@^1.4.2
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^7.2.0

[env:ota]
extends = env:esp32-4848s040
upload_protocol = espota
upload_flags =
    --port=3232

; Spec 13 step 10: second supported board.
; Waveshare ESP32-S3-Touch-LCD-4 - same 480x480 ST7701 panel + GT911 touch
; as the Sunton, but with an on-board CAN transceiver (NMEA2000 capable).
; Display init still lives in main.cpp until spec 13 step 3 lands; what
; differs here at build time is board::id / capabilities (nmea2000_can,
; backlight pin override).
[env:waveshare-touch-lcd-4]
extends = env:esp32-4848s040
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D BOARD_HAS_PSRAM
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -I include
    -DCORE_DEBUG_LEVEL=3
    -D BOARD_ID_DEFINED
    -D BOARD_ID_WAVESHARE_TOUCH_LCD_4

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = -<*> +<signalk_parser.cpp> +<layout.cpp> +<boat_data.cpp> +<nmea0183_parser.cpp> +<autopilot_pure.cpp> +<manager_config.cpp> +<font_resolver.cpp> +<widget_data_resolver.cpp> +<boards/board_native_fake.cpp> +<ui/layout_context.cpp> +<manager_url.cpp> +<error_log.cpp> +<hostname_check.cpp> +<ui_config_check.cpp> +<sources_check.cpp> +<log_level_check.cpp>
build_flags =
    -std=c++17
    -I include
    -DUNITY_INCLUDE_DOUBLE
    -DUNITY_DOUBLE_PRECISION=1e-12
    -DARDUINOJSON_USE_DOUBLE=1
    -DBOARD_ID_DEFINED
    -DBOARD_ID_NATIVE_FAKE
lib_deps =
    bblanchon/ArduinoJson@^7.2.0
test_filter =
    test_parser
    test_layout
    test_boat_data
    test_nmea0183
    test_autopilot
    test_manager_config
    test_font_resolver
    test_widget_data
    test_board
    test_manager_url
    test_error_log
    test_hostname_check
    test_ui_config_check
    test_sources_check
    test_log_level_check
