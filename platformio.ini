; PlatformIO project for esp32-boat-mfd
; https://github.com/navado/esp32-boat-mfd
;
; SPDX-License-Identifier: PolyForm-Noncommercial-1.0.0
;
; Envs:
;   esp32-4848s040  - production firmware build (Sunton ESP32-4848S040)
;   release-*       - CI release builds; same boards, debug/test controls off
;   ota             - extends above; sets upload_protocol=espota. Pass IP at runtime:
;                       pio run -e ota -t upload --upload-port <ip>
;   native          - host-side unit tests for the SignalK delta parser

[env:esp32-4848s040]
; Spec 21 A is currently parked - the IDF 5.x bump surfaces 36 stricter
; format-string sites + NimBLE-Arduino 1.4 incompatibility (esp_bt.h
; moved); A's realistic cost is 5-7 days, not 2-3. See spec 21 for the
; updated estimate. Keeping the Arduino 2.x + IDF 4.4 path stable while
; A is scheduled.
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
framework = arduino

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D BOARD_HAS_PSRAM
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -I include
    -DCORE_DEBUG_LEVEL=3
    -D BOARD_ID_DEFINED
    -D BOARD_ID_SUNTON_4848S040
    ; Stack canaries on our own code. The prebuilt Arduino core ships with
    ; CONFIG_COMPILER_STACK_CHECK_MODE_NONE, so the sdkconfig toggle is inert;
    ; this compiler flag applies -fstack-protector to the firmware sources
    ; where the large stack temporaries live, turning silent overflow into a
    ; named __stack_chk_fail panic (captured in the prevboot ring). newlib/IDF
    ; provides __stack_chk_guard/_fail.
    -fstack-protector-strong

monitor_speed = 115200
upload_speed = 115200
extra_scripts = pre:tools/version.py

lib_deps =
    moononournation/GFX Library for Arduino@~1.4.7
    lvgl/lvgl@^9.2.0
    https://github.com/TAMCTec/gt911-arduino.git
    h2zero/NimBLE-Arduino@^1.4.2
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^7.2.0

[env:esp32-4848s040-arduino]
extends = env:esp32-4848s040
platform = espressif32@^6.7.0
framework = arduino

[env:ota]
extends = env:esp32-4848s040
upload_protocol = espota
upload_flags =
    --port=3232

; Lab-only debug build. Same firmware as the production env plus opt-in
; debug features compiled in via ESPDISP_DEBUG_* flags. Never ship this
; to end users:
;   - ESPDISP_DEBUG_UDP_LOG: broadcasts every logf() line to UDP
;     <broadcast>:UDP_LOG_PORT for the lab listener
;     (tools/lab-logger/) to capture and rotate.
;   - -fstack-protector-strong: turns silent stack overflow into a clean
;     panic with backtrace, which the crash-forensics RTC ring (commit
;     1bc8ddb) then re-emits as [prevboot] lines on the next boot. The
;     pre-fix `handle_logs` 19 KiB stack array sat undetected for who
;     knows how long because canaries were off in sdkconfig.
;     `-strong` covers functions with arrays/refs/structs - the realistic
;     hit list for embedded code - without the runtime cost of `-all`.
; Add new debug flags here; production env stays minimal and stable.
[env:esp32-4848s040-debug]
extends = env:esp32-4848s040
build_flags =
    ${env:esp32-4848s040.build_flags}
    -D ESPDISP_DEBUG_UDP_LOG=1
    -fstack-protector-strong

; OTA variant of the debug build for flashing the lab device without USB.
[env:ota-debug]
extends = env:esp32-4848s040-debug
upload_protocol = espota
upload_flags =
    --port=3232

; Performance-counter build: enables the bench-sweep harness + all DBG_PERF
; counters (render/CPU/throughput/network/memory) via -DDBG_PERF_COUNTERS.
; Lab/bench only; the counters are compiled out of every other env.
[env:esp32-4848s040-perf]
extends = env:esp32-4848s040
build_flags =
    ${env:esp32-4848s040.build_flags}
    -D DBG_PERF_COUNTERS=1
    -D ESPDISP_DEBUG_UDP_LOG=1
    -fstack-protector-strong

; OTA variant of the perf build.
[env:ota-perf]
extends = env:esp32-4848s040-perf
upload_protocol = espota
upload_flags =
    --port=3232

