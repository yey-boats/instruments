extends = env:esp32-4848s040
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D BOARD_HAS_PSRAM
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -I include
    -DCORE_DEBUG_LEVEL=3
    -D BOARD_ID_DEFINED
    -D BOARD_ID_WAVESHARE_TOUCH_LCD_4
    -D ENABLE_NMEA2000
    -D TOUCH_INT=16
    -D TOUCH_INT_ACTIVE_LOW=1

[env:waveshare-touch-lcd-4_3]
