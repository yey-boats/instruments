[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = -<*> +<signalk_parser.cpp> +<layout.cpp> +<boat_data.cpp> +<nmea0183_parser.cpp> +<autopilot_pure.cpp> +<manager_config.cpp> +<font_resolver.cpp> +<widget_data_resolver.cpp> +<boards/board_common.cpp> +<boards/board_native_fake.cpp> +<ui/layout_context.cpp> +<manager_url.cpp> +<manager_endpoint.cpp> +<error_log.cpp> +<hostname_check.cpp> +<ui_config_check.cpp> +<sources_check.cpp> +<log_level_check.cpp> +<device_discovery.cpp>
build_flags =
    -std=c++17
    -I include
    -DUNITY_INCLUDE_DOUBLE
    -DUNITY_DOUBLE_PRECISION=1e-12
    -DARDUINOJSON_USE_DOUBLE=1
    -DBOARD_ID_DEFINED
    -DBOARD_ID_NATIVE_FAKE
lib_deps =
    bblanchon/ArduinoJson@^7.2.0
test_filter =
    test_parser
    test_layout
    test_boat_data
    test_nmea0183
    test_autopilot
    test_manager_config
    test_font_resolver
    test_widget_data
    test_board
    test_manager_url
    test_manager_endpoint
    test_error_log
    test_hostname_check
    test_ui_config_check
    test_sources_check
    test_log_level_check
    test_device_discovery
